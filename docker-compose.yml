services:
  app:
    build: .
    restart: unless-stopped
    ports:
      - "80:8080"
    environment:
      NODE_ENV: production
      PORT: "8080"
      DATABASE_URL: postgres://stroxx:stroxx@db:5432/stroxx
      SESSION_SECRET: ${SESSION_SECRET}
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: stroxx
      POSTGRES_USER: stroxx
      POSTGRES_PASSWORD: stroxx
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stroxx -d stroxx"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  db_data:
